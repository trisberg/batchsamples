applications:
  - name: billrun
    memory: 32M
    health-check-type: process
    no-route: true
    instances: 0
    disk_quota: 1G
    timeout: 180
    buildpacks:
      - java_buildpack_offline
    env:
      JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 17.+ } }'
      SPRING_BATCH_JDBC_INITIALIZE_SCHEMA: always
    path: target/billrun-0.0.1-SNAPSHOT.jar
    services:
      - task-example-mysql
